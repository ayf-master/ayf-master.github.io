# Welcome to Jekyll!

## => Site Settings
##############################
text_skin: default
highlight_theme: default
url     : "https://ayf-master.github.io"
baseurl : ""
title   : ayf 的项目作品集
description: >-
  大学生个人项目展示 | 课程作业 & 小作品
theme: jekyll-TeXt-theme

## => Language and Timezone
##############################
lang: zh
timezone: Asia/Shanghai

## => Author and Social
##############################
author:
  type      : person
  name      : ayf
  url       : "https://ayf-master.github.io"
  avatar    :
  bio       : 热爱编程，喜欢做小项目
  email     :
  github    : ayf-master

## => GitHub Repository
##############################
repository: ayf-master/ayf-master.github.io
repository_tree: master

## => Paths
##############################
paths:
  root    : /
  home    : /
  archive : /archive.html
  rss     : /feed.xml

## => Post
##############################
excerpt_separator: <!--more-->
license: CC-BY-NC-4.0

toc:
  selectors: h1,h2,h3

## => Markdown Enhancements
##############################
mathjax: false
mathjax_autoNumber: false
mermaid: false
chart: false

## => Paginate
##############################
paginate: 8
paginate_path: /page:num

## => Sources
##############################
sources: bootcdn

## => Sharing
##############################
sharing:
  provider: false

## => Comments
##############################
comments:
  provider: false

## => Pageview
##############################
pageview:
  provider: false

## => Search
##############################
search:
  provider: default

## => Analytics
##############################
analytics:
  provider: false

## => Build
##############################
markdown    : kramdown
highlighter : rouge
permalink   : date

exclude:
  - CHANGELOG.md
  - HOW_TO_RELEASE.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README-*.md
  - README.md
  - gulpfile.js
  - jekyll-text-theme.gemspec
  - package-lock.json
  - package.json
  - /docs
  - /node_modules
  - /screenshots
  - /test
  - /vendor

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: article
      sharing: false
      license: false
      aside:
        toc: true
      show_edit_on_github: false
      show_subscribe: false
      pageview: false

## => Plugins
##############################
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji
